<!DOCTYPE html>
<html>
<head>
    <title>Add Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        function addRow() {
            let table = document.getElementById("foodTable");
            let row = table.insertRow();

            row.innerHTML = `
                <td><input type="text" name="food[]" class="form-control" required></td>
                <td><input type="number" name="qty[]" class="form-control" required></td>
                <td><input type="text" name="loc[]" class="form-control" required></td>
                <td><input type="text" name="contact[]" class="form-control" required></td>
                <td><input type="date" name="expiry[]" class="form-control" required></td>
            `;
        }
    </script>
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="text-center mb-3">Add Multiple Food Items</h3>

        <form method="POST">

            <table class="table table-bordered" id="foodTable">
                <tr>
                    <th>Food</th>
                    <th>Qty</th>
                    <th>Location</th>
                    <th>Contact</th>
                    <th>Expiry</th>
                </tr>

                <!-- Default Row -->
                <tr>
                    <td><input type="text" name="food[]" class="form-control" required></td>
                    <td><input type="number" name="qty[]" class="form-control" required></td>
                    <td><input type="text" name="loc[]" class="form-control" required></td>
                    <td><input type="text" name="contact[]" class="form-control" required></td>
                    <td><input type="date" name="expiry[]" class="form-control" required></td>
                </tr>
            </table>

            <button type="button" onclick="addRow()" class="btn btn-secondary mb-2">
                ➕ Add More
            </button>

            <button type="submit" class="btn btn-success w-100">
                Submit All
            </button>

        </form>
    </div>
</div>

</body>
</html>
